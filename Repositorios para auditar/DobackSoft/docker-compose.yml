# DobackSoft - Prod/Comercial: stack completo (db, redis, backend, frontend)
# Uso: docker compose up -d
# Requiere .env con POSTGRES_USER, POSTGRES_PASSWORD, JWT_SECRET, etc.

services:
  db:
    image: postgis/postgis:17-3.5
    container_name: dobacksoft-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dobacksoft}
    ports:
      - "5433:5432"
    volumes:
      - dobacksoft_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dobacksoft}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    container_name: dobacksoft-valhalla
    ports:
      - "8002:8002"
    volumes:
      - valhalla_data:/custom_files
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      tile_urls: https://download.geofabrik.de/europe/spain/madrid-latest.osm.pbf
      serve_tiles: "True"
      build_elevation: "False"
      build_admins: "False"
      build_time_zones: "False"
      use_tiles_ignore_pbf: "False"
      build_tar: "True"
      force_rebuild: "False"
      server_threads: "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8002/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dobacksoft-redis
    ports:
      - "6379:6379"
    volumes:
      - dobacksoft_redis:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/hermoso92/dobacksoft-backend:latest}
    container_name: dobacksoft-backend
    environment:
      NODE_ENV: production
      PORT: 9998

      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dobacksoft}
      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5174}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}

      DATA_DIR: ${DATA_DIR:-/home/doback/datosDoback/CMadrid}
      INGESTION_DATA_FOLDER: ${INGESTION_DATA_FOLDER:-/home/doback/datosDoback}

      VALHALLA_URL: http://valhalla:8002
      ENABLE_VALHALLA_MAP_MATCHING: ${ENABLE_VALHALLA_MAP_MATCHING:-true}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy --schema=prisma/schema.prisma && node dist/src/index.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:9998/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    ports:
      - "9998:9998"
    volumes:
      - ${DATOS_DOBACK_HOST_PATH:-/home/doback/datosDoback}:${DATOS_DOBACK_CONTAINER_PATH:-/home/doback/datosDoback}:rw

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/hermoso92/dobacksoft-frontend:latest}
    container_name: dobacksoft-frontend
    ports:
      - "5174:80"
    # NO depends_on backend: evita que al actualizar frontend arrastre backend.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  dobacksoft_pgdata:
  dobacksoft_redis:
  valhalla_data:
