# Pipeline: Testing → Deploy → Upload
#
# Flujo:
#   PR abierto/actualizado → Test → Upload artefactos
#   Merge a main (push)    → Test → Deploy GitHub Pages → Upload
#
# Activar Pages: Repo Settings > Pages > Source: GitHub Actions

name: Pipeline (Test + Deploy + Upload)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. TESTING ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: playwright install chromium

      - name: Tests producción
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/run_tests_produccion.py

      - name: Verificación completa
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/verificar_todo.py

      - name: Subir artefactos (test)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verificacion-${{ github.sha }}
          path: |
            verificacion_completa.json
            pruebas/reporte_produccion.log
          if-no-files-found: ignore

  # ─── 2. DEPLOY (solo en main, tras tests OK) ─────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── 3. UPLOAD FINAL (consolidar artefactos) ───────────────────────────
  upload-summary:
    name: Upload resumen
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'
    steps:
      - name: Descargar artefactos de test
        uses: actions/download-artifact@v4
        with:
          pattern: verificacion-*
          merge-multiple: true

      - name: Subir artefactos consolidados
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ github.run_number }}-${{ github.sha }}
          path: |
            verificacion_completa.json
            reporte_produccion.log
            pruebas/reporte_produccion.log
          if-no-files-found: ignore
