# Pipeline: Testing → Deploy → Upload
#
# Flujo:
#   PR / push → test (Python) y test-swift-core (SPM + Xcode) en paralelo → upload-summary
#   Push a main → mismos tests; si ambos OK → Deploy Pages y Deploy VPS (entre sí en paralelo)
#
# Secrets requeridos:
#   - PAGES_TOKEN: PAT para GitHub Pages (opcional si Pages ya está activo)
#   - SSH_HOST: IP o dominio del VPS
#   - SSH_USER: usuario SSH (ej. root)
#   - SSH_PRIVATE_KEY: clave privada SSH (contenido completo)
#   - REMOTE_PATH: (opcional) ruta en VPS, default /opt/artificial-world

name: Pipeline (Test + Deploy + Upload)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# No cancelar runs en progreso: los deploys deben completar aunque haya nuevos push
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── 1. TESTING ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Higiene del repo (sin monorepo anidado en iOS)
        run: bash scripts/check_repo_hygiene.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: playwright install chromium

      - name: Tests producción
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/run_tests_produccion.py

      - name: Verificación completa
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/verificar_todo.py

      - name: Subir artefactos (test)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verificacion-${{ github.sha }}
          path: |
            verificacion_completa.json
            pruebas/reporte_produccion.log
          if-no-files-found: ignore

  test-swift-core:
    name: Swift macOS (SPM + app iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Higiene del repo (sin monorepo anidado en iOS)
        run: bash scripts/check_repo_hygiene.sh

      - name: Swift package tests
        run: swift test --package-path SwiftAWCore

      - name: Build ArtificialWorld (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ArtificialWorld/ArtificialWorld.xcodeproj \
            -scheme ArtificialWorld \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build ArtificialWorldV2 (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ArtificialWorldV2/ArtificialWorldV2.xcodeproj \
            -scheme ArtificialWorldV2 \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  # ─── 2. DEPLOY PAGES ───────────────────────────────────────────────────
  # Requiere: Settings > Pages > Source = GitHub Actions
  # Secret: PAGES_TOKEN (PAT con scope repo)
  # Solo publica docs si pasan tests Python (ubuntu) y Swift SPM + build iOS (macOS).
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: [test, test-swift-core]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # false = Pages ya activo en Settings; true = habilitar vía API (requiere PAGES_TOKEN)
          enablement: false

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── 2b. DEPLOY VPS ────────────────────────────────────────────────────
  # Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
  # Opcional: REMOTE_PATH (default /opt/constructor-de-mundos)
  # Usa docker-compose.prod.yml = fullstack Node+React (puerto 3001)
  deploy-vps:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: [test, test-swift-core]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar secrets VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::warning::Secrets VPS no configurados — saltando deploy"
            exit 0
          fi
          echo "Secrets VPS OK"

      - name: Configurar path remoto
        env:
          RP: ${{ secrets.REMOTE_PATH }}
        run: echo "REMOTE_PATH=${RP:-/opt/constructor-de-mundos}" >> $GITHUB_ENV

      - name: Configurar SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync al VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '__pycache__' --exclude '*.pyc' \
            --exclude '*.db' --exclude '*.log' --exclude 'node_modules' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${REMOTE_PATH}/"

      - name: Build y levantar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REMOTE_PATH
          script: |
            cd ${REMOTE_PATH:-/opt/constructor-de-mundos}
            docker compose -f docker-compose.prod.yml up -d --build

  # ─── 3. UPLOAD FINAL (consolidar artefactos) ───────────────────────────
  upload-summary:
    name: Upload resumen
    runs-on: ubuntu-latest
    needs: [test, test-swift-core]
    if: always() && needs.test.result != 'cancelled' && needs.test-swift-core.result != 'cancelled'
    steps:
      - name: Descargar artefactos de test
        uses: actions/download-artifact@v4
        with:
          pattern: verificacion-*
          merge-multiple: true

      - name: Subir artefactos consolidados
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ github.run_number }}-${{ github.sha }}
          path: |
            verificacion_completa.json
            reporte_produccion.log
            pruebas/reporte_produccion.log
          if-no-files-found: ignore
