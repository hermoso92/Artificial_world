# Pipeline: Testing → Deploy → Upload
#
# Flujo:
#   PR abierto/actualizado → Test → Upload artefactos
#   Merge a main (push)    → Test + Deploy Pages + Deploy VPS (en paralelo)
#
# Secrets requeridos:
#   - PAGES_TOKEN: PAT para GitHub Pages (opcional si Pages ya está activo)
#   - SSH_HOST: IP o dominio del VPS
#   - SSH_USER: usuario SSH (ej. root)
#   - SSH_PRIVATE_KEY: clave privada SSH (contenido completo)
#   - REMOTE_PATH: (opcional) ruta en VPS, default /opt/artificial-world

name: Pipeline (Test + Deploy + Upload)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. TESTING ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: playwright install chromium

      - name: Tests producción
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/run_tests_produccion.py

      - name: Verificación completa
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python pruebas/verificar_todo.py

      - name: Subir artefactos (test)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verificacion-${{ github.sha }}
          path: |
            verificacion_completa.json
            pruebas/reporte_produccion.log
          if-no-files-found: ignore

  # ─── 2. DEPLOY PAGES ───────────────────────────────────────────────────
  # Requiere: Settings > Pages > Source = GitHub Actions
  # Secret: PAGES_TOKEN (PAT con scope repo)
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
          token: ${{ secrets.PAGES_TOKEN }}

      - name: Upload artifact (Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── 2b. DEPLOY VPS ────────────────────────────────────────────────────
  # Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
  # Opcional: REMOTE_PATH (default /opt/constructor-de-mundos)
  # Usa docker-compose.prod.yml = fullstack Node+React (puerto 3001)
  deploy-vps:
    name: Deploy VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configurar path remoto
        env:
          RP: ${{ secrets.REMOTE_PATH }}
        run: echo "REMOTE_PATH=${RP:-/opt/constructor-de-mundos}" >> $GITHUB_ENV

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync al VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '__pycache__' --exclude '*.pyc' \
            --exclude '*.db' --exclude '*.log' --exclude 'node_modules' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${REMOTE_PATH}/"

      - name: Build y levantar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REMOTE_PATH
          script: |
            cd ${REMOTE_PATH:-/opt/constructor-de-mundos}
            docker compose -f docker-compose.prod.yml up -d --build

  # ─── 3. UPLOAD FINAL (consolidar artefactos) ───────────────────────────
  upload-summary:
    name: Upload resumen
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'
    steps:
      - name: Descargar artefactos de test
        uses: actions/download-artifact@v4
        with:
          pattern: verificacion-*
          merge-multiple: true

      - name: Subir artefactos consolidados
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ github.run_number }}-${{ github.sha }}
          path: |
            verificacion_completa.json
            reporte_produccion.log
            pruebas/reporte_produccion.log
          if-no-files-found: ignore
