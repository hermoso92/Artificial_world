# Constructor de Mundos — Production
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: constructor-de-mundos
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-data:
